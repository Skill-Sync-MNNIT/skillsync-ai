version: '3.8'

# SkillSync AI – Local Development Stack
# Run: docker-compose up -d
#
# Services:
#   mongodb    → local DB (mirrors MongoDB Atlas free tier)
#   ai-service → Python FastAPI + LangChain (port 8000)
#
# NOT in compose (use free cloud services):
#   Redis      → Upstash free tier (upstash.com)
#   Storage    → Cloudinary free tier (cloudinary.com)

services:
  mongodb:
    image: mongo:7
    container_name: skillsync-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: skillsync

  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: skillsync-ai
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./ai-service:/app
    depends_on:
      - mongodb
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  mongo_data:
